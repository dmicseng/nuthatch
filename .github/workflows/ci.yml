name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nuthatch
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: nuthatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
        env:
          DATABASE_URL: postgres://nuthatch:test_password@localhost:5432/nuthatch_test
          REDIS_URL: redis://localhost:6379
          NUTHATCH_SECRET_KEY: test_secret_key_do_not_use_in_production

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgres://nuthatch:test_password@localhost:5432/nuthatch_test
          REDIS_URL: redis://localhost:6379
          NUTHATCH_SECRET_KEY: test_secret_key_do_not_use_in_production
