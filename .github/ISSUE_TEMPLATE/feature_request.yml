name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Before filling this out, please search existing issues — it may already be requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the problem first, not the solution. "I want to do X but Y blocks me" is stronger than "please add Z".
      placeholder: I need to track subscriptions in multiple currencies, but currently I can only pick one primary currency.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would a solution look like?
      description: Your best guess. We may end up implementing it differently.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about. Why didn't they work?

  - type: dropdown
    id: willingness
    attributes:
      label: Willingness to contribute
      description: Are you able to help implement this?
      options:
        - I can build this myself with guidance
        - I can help with design/spec but not implementation
        - I can help test
        - I can't contribute right now but I'd use this feature
    validations:
      required: true
